
# ─── Prefix ───────────────────────────────────────────────────────────
# Remove default prefix
unbind C-b

# Set C-a as prefix
set -g prefix C-a
bind-key C-a send-prefix

# Also allow § as an alternate prefix
set -g prefix2 §
bind-key § send-prefix -2

# Double-tap § to switch to last window
bind-key § last-window

set -g default-terminal "xterm-256color"

# Open new panes in the same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'seebi/tmux-colors-solarized'

# Solarized theme variant: dark (256), light, base16
set -g @colors-solarized 'dark'

# Auto-save and restore sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Configuration for battery display
set -g status-right '#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M '

# Mouse and clipboard support
set -g mouse on
set -s set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
