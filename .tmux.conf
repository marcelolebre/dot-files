# ─── Prefix ───────────────────────────────────────────────────────────
# Remove default prefix
unbind C-b

# CapsLock is remapped to F18 via Karabiner-Elements (see setup.sh).
# tmux 3.6 doesn't parse "F18" as a key name, but xterm-256color sends
# F18 as \e[17;2~ — register that sequence as user-key 0 and bind it.
set -s user-keys[0] "\e[17;2~"
set -g prefix User0
bind-key User0 send-prefix

# C-a as failsafe alternate prefix (works without the Karabiner remap)
set -g prefix2 C-a
bind-key C-a send-prefix -2

# Double-tap CapsLock to switch to last window
bind-key User0 last-window
# ─── /Prefix ──────────────────────────────────────────────────────────

# ─── Config reload ────────────────────────────────────────────────────
# tmux never re-reads ~/.tmux.conf on its own — an edit only lands in
# sessions started afterwards, so a changed format or binding silently lags
# in whatever you've already got open (exactly how the pane-label branch
# went missing). prefix + r sources the file into the running server and
# confirms, so the live config is always one keystroke from matching disk.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
# ─── /Config reload ───────────────────────────────────────────────────

set -g default-terminal "xterm-256color"

# Open new panes in the same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'seebi/tmux-colors-solarized'

# Solarized theme variant: dark (256), light, base16
set -g @colors-solarized 'dark'

# Auto-save and restore sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Configuration for battery display
set -g status-right '#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M '

# Mouse and clipboard support
set -g mouse on
set -s set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ─── Per-pane project banner ──────────────────────────────────────────
# A small label on each pane's top border showing the project being worked
# on — derived from the folder under ~/Projects/<project>, so it's correct
# even when the pane has cd'd into a subdirectory — plus the git branch the
# pane is on, e.g. "dot-files @ master". When the pane isn't inside a git
# repo there's no " @ …" suffix.
#
# Every pane of the SAME project gets the SAME color, active or not, so you
# can tell at a glance which panes belong together. The color is a stable
# hash of the project name into a palette (see the helper script), so
# "dot-files" always lands on the same hue across sessions and subdirectories.
# The branch is NOT part of the hash, so switching branch keeps the color. The
# active pane fills that color as a background tag; inactive panes wear it as
# the text color, so projects stay distinguishable when not selected.
#
# The logic lives in ~/.tmux/pane-label.sh rather than inline: tmux finds the
# end of a #() by counting parentheses, and the unmatched ')' in a shell `case`
# pattern makes it stop early and print the rest as literal text (which is what
# the old inline version did). Calling a script keeps what tmux sees balanced.
# tmux expands the #{...} args, runs the script via /bin/sh, then re-parses the
# #[fg=…] it prints as a real style. Single-pane windows draw no border, so the
# label only shows with 2+ panes.
set -g pane-border-status top
set -g pane-border-format '#[align=centre]#($HOME/.tmux/pane-label.sh "#{pane_current_path}" "#{pane_active}")'

# Make the dividing lines clearly visible: inactive borders are a bright
# grey, the active pane's border is bold cyan to stand out at a glance.
# NOTE: the colors are (re)applied after tpm at the bottom of this file —
# the solarized plugin sets a near-black border and loads last, so setting
# them only here would be overridden on a fresh tmux start.
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour250'
set -g pane-active-border-style 'fg=colour51,bold'
# ─── /Per-pane project banner ─────────────────────────────────────────

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

# Re-apply the pane border colors AFTER tpm loads — the solarized plugin sets
# a near-invisible border and loads in the background after the rest of this
# file, so this delayed override is what actually wins on a fresh start.
run -b 'sleep 2 && tmux set -g pane-border-style "fg=colour250" \; set -g pane-active-border-style "fg=colour51,bold"'
